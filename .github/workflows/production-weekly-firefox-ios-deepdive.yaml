name: Firefox iOS Health Monitoring Deep Dive - WEEKLY - Production

# Weekly on Tuesdays at 10am GMT
on:
  schedule:
    - cron:  0 10 * * 2

  workflow_dispatch:
    inputs:
      branchName:
        description: 'Default branch'
        required: true
        default: 'master'

env:
  CLOUD_SQL_DATABASE_NAME: preflight
  CLOUD_SQL_DATABASE_USERNAME: ${{ secrets.CLOUD_SQL_DATABASE_USERNAME }}
  CLOUD_SQL_DATABASE_PASSWORD: ${{ secrets.CLOUD_SQL_DATABASE_PASSWORD }}
  CLOUD_SQL_DATABASE_PORT: ${{ secrets.CLOUD_SQL_DATABASE_PORT }}
  TESTRAIL_HOST: ${{ secrets.TESTRAIL_HOST }}
  TESTRAIL_USERNAME: ${{ secrets.TESTRAIL_USERNAME }}
  TESTRAIL_PASSWORD: ${{ secrets.TESTRAIL_PASSWORD }}
  ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
  ATLASSIAN_HOST: ${{ secrets.ATLASSIAN_HOST }}
  ATLASSIAN_USERNAME: ${{ secrets.ATLASSIAN_USERNAME }}
  JIRA_HOST: ${{ secrets.JIRA_HOST }}
  JIRA_USER: ${{ secrets.JIRA_USER }}
  JIRA_PASSWORD: ${{ secrets.JIRA_PASSWORD }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  BUGZILLA_API_KEY: ${{ secrets.BUGZILLA_API_KEY }}
  BITRISE_HOST: ${{ secrets.BITRISE_HOST }}
  BITRISE_APP_SLUG: ${{ secrets.BITRISE_APP_SLUG }}
  BITRISE_TOKEN: ${{ secrets.BITRISE_TOKEN }}
  SENTRY_HOST: ${{ secrets.SENTRY_HOST }}
  SENTRY_API_TOKEN: ${{ secrets.SENTRY_API_TOKEN_CSO }}
  SENTRY_ORGANIZATION_SLUG: ${{ secrets.SENTRY_ORGANIZATION_SLUG }}
  SENTRY_IOS_PROJECT_ID: ${{ secrets.SENTRY_IOS_PROJECT_ID }}
  SENTRY_FENIX_PROJECT_ID: ${{ secrets.SENTRY_FENIX_PROJECT_ID }}
  SENTRY_FENIX_BETA_PROJECT_ID: ${{ secrets.SENTRY_FENIX_BETA_PROJECT_ID }}

jobs:
  iOS_health_deepdive:
    name: Weekly Health Monitoring Deep Dive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: "pip"
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - uses: mattes/gce-cloudsql-proxy-action@v1
        with:
          creds: ${{ secrets.GCLOUD_AUTH }}
          instance: ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
          port: ${{ secrets.CLOUD_SQL_DATABASE_PORT }}
          proxy_version: "1.37.11"
      - name: Get crash free rates report
        run: |
          python __main__.py --report-type sentry-rates --project firefox-ios
          python -m api.sentry.utils --file ./sentry_rates.csv --project firefox-ios --shortform
      - name: Get new Github issues report
        run: |
          python __main__.py --report-type github-issues --project firefox-ios --num-days 7
          python -m api.github.utils github_new_bugs_firefox-ios_*.csv > github-new-issues-slack.json
      - name: Set report date
        id: date
        run: echo "value=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      - name: Create Slack thread
        id: slack-health
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_TESTOPS_BOT_TOKEN }}
          payload: |
            channel: "${{ secrets.SLACK_CHANNEL_ID_FIREFOX_IOS_DEV  }}"
            text: ":health: Health Monitoring Deep Dive - (${{ steps.date.outputs.value }})"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: ":health: *Health Monitoring Deep Dive (${{ steps.date.outputs.value }})* :thread:"
      - name: Create Slack payloads
        run: |
          jq --arg channel "${{ secrets.SLACK_CHANNEL_ID_FIREFOX_IOS_DEV  }}" \
             --arg thread_ts "${{ steps.slack-health.outputs.ts }}" \
             '. + {channel: $channel, thread_ts: $thread_ts}' \
             sentry-slack-firefox-ios.json > sentry-slack-firefox-ios-thread.json
          jq --arg channel "${{ secrets.SLACK_CHANNEL_ID_FIREFOX_IOS_DEV  }}" \
             --arg thread_ts "${{ steps.slack-health.outputs.ts }}" \
             '. + {channel: $channel, thread_ts: $thread_ts}' \
             github-new-issues-slack.json > github-new-issues-slack-thread.json
      - name: "Post to Slack: Looker Dashboard"
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_TESTOPS_BOT_TOKEN }}
          payload: |
            channel: "${{ secrets.SLACK_CHANNEL_ID_FIREFOX_IOS_DEV }}"
            thread_ts: "${{ steps.slack-health.outputs.ts }}"
            text: ":looker: <https://mozilla.cloud.looker.com/dashboards/operational_monitoring::firefox_ios_health?Date=&Percentile=50|Looker Dashboard>"
      - name: "Post to Slack: Crash Free Rates"
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_TESTOPS_BOT_TOKEN }}
          payload-file-path: "./sentry-slack-firefox-ios-thread.json"
      - name: "Post to Slack: New Github Issues"
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_TESTOPS_BOT_TOKEN }}
          payload-file-path: "./github-new-issues-slack-thread.json"